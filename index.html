<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Life Optimiser — Michael Webster</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://unpkg.com/lucide@0.344.0/dist/umd/lucide.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0f2f5; --white: #ffffff; --border: #e8ecf1;
    --text: #1a1d26; --text-secondary: #6b7280; --text-dim: #9ca3af;
    --purple: #7c5cfc; --purple-bg: #f0ecff;
    --red: #ef4444; --red-bg: #fef2f2;
    --blue: #3b82f6; --blue-bg: #eff6ff;
    --orange: #f97316; --orange-bg: #fff7ed;
    --green: #22c55e; --green-bg: #f0fdf4;
    --teal: #14b8a6; --teal-bg: #f0fdfa;
    --pink: #ec4899; --pink-bg: #fdf2f8;
    --yellow: #eab308; --yellow-bg: #fefce8;
    --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.06);
    --shadow-md: 0 4px 6px rgba(0,0,0,0.04), 0 2px 4px rgba(0,0,0,0.06);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Inter',system-ui,-apple-system,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; padding:16px; -webkit-font-smoothing:antialiased; }

  .dashboard { max-width:1360px; margin:0 auto; display:grid; gap:14px; grid-template-columns:1fr; }
  @media(min-width:768px){ .dashboard{grid-template-columns:repeat(2,1fr);} }
  @media(min-width:1100px){ .dashboard{grid-template-columns:repeat(3,1fr);} }

  /* Header */
  .header { grid-column:1/-1; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px; padding:20px 24px; background:var(--white); border-radius:20px; box-shadow:var(--shadow); }
  .header-left h1 { font-size:1.5rem; font-weight:800; letter-spacing:-0.03em; color:var(--text); }
  .header-left .subtitle { font-size:0.8rem; color:var(--text-secondary); margin-top:2px; font-weight:500; }
  .header-badges { display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
  .badge { display:flex; flex-direction:column; align-items:center; padding:10px 16px; border-radius:14px; }
  .badge .num { font-size:1.5rem; font-weight:800; line-height:1; }
  .badge .label { font-size:0.6rem; font-weight:600; text-transform:uppercase; letter-spacing:0.06em; margin-top:3px; }
  .refresh-pill { font-size:0.65rem; color:var(--text-dim); background:var(--bg); padding:5px 12px; border-radius:8px; font-weight:500; }

  /* Cards */
  .card { background:var(--white); border-radius:18px; padding:20px; box-shadow:var(--shadow); overflow:hidden; }
  .card:hover { box-shadow:var(--shadow-md); }
  .card-header { display:flex; align-items:center; gap:10px; margin-bottom:16px; }
  .card-icon { width:36px; height:36px; border-radius:10px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .card-icon svg { width:18px; height:18px; stroke-width:2; }
  .card-title { font-size:0.78rem; font-weight:700; color:var(--text); }
  .card-subtitle { font-size:0.65rem; color:var(--text-dim); font-weight:500; }
  .card-wide { grid-column:1/-1; }
  @media(min-width:768px){ .card-2col{grid-column:span 2;} }

  /* Chart containers */
  .chart-wrap { position:relative; width:100%; }
  .chart-wrap canvas { width:100%!important; }

  /* Stat rows inside cards */
  .stat-row { display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--border); font-size:0.8rem; }
  .stat-row:last-child { border-bottom:none; }
  .stat-label { color:var(--text-secondary); font-weight:500; }
  .stat-val { font-weight:700; }

  /* Mini stat pills */
  .stat-pills { display:flex; gap:8px; flex-wrap:wrap; margin-top:12px; }
  .stat-pill { flex:1; min-width:70px; text-align:center; padding:10px 8px; border-radius:12px; background:var(--bg); }
  .stat-pill .sp-val { font-size:1.15rem; font-weight:800; display:block; line-height:1.2; }
  .stat-pill .sp-label { font-size:0.55rem; color:var(--text-dim); font-weight:600; text-transform:uppercase; letter-spacing:0.04em; }

  /* Running Goals */
  .goal-item { margin-bottom:14px; }
  .goal-item:last-child { margin-bottom:0; }
  .goal-top { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:5px; }
  .goal-name { font-size:0.8rem; font-weight:700; }
  .goal-time { font-size:0.75rem; color:var(--text-secondary); }
  .goal-bar { height:8px; background:var(--bg); border-radius:4px; overflow:hidden; }
  .goal-fill { height:100%; border-radius:4px; }
  .goal-meta { display:flex; justify-content:space-between; font-size:0.6rem; color:var(--text-dim); margin-top:3px; font-weight:500; }

  /* Thesis chapters */
  .chapter { display:flex; align-items:center; gap:10px; padding:7px 0; }
  .ch-num { width:24px; height:24px; border-radius:7px; display:flex; align-items:center; justify-content:center; font-size:0.6rem; font-weight:700; flex-shrink:0; }
  .ch-name { flex:1; font-size:0.78rem; font-weight:500; }
  .ch-bar { width:72px; height:6px; background:var(--bg); border-radius:3px; overflow:hidden; }
  .ch-fill { height:100%; border-radius:3px; }
  .ch-pct { font-size:0.65rem; font-weight:700; min-width:30px; text-align:right; }
  .thesis-tasks { margin-top:14px; padding-top:12px; border-top:1px solid var(--border); }
  .task-item { display:flex; align-items:flex-start; gap:8px; padding:5px 0; font-size:0.75rem; line-height:1.4; }
  .task-check { width:16px; height:16px; border-radius:5px; border:2px solid var(--border); display:flex; align-items:center; justify-content:center; flex-shrink:0; margin-top:1px; font-size:0.55rem; }
  .task-check.done { background:var(--green); border-color:var(--green); color:white; }

  /* Schedule */
  .sched-day { margin-bottom:14px; }
  .sched-day:last-child { margin-bottom:0; }
  .sched-label { font-size:0.65rem; font-weight:700; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.05em; margin-bottom:6px; }
  .sched-event { display:flex; align-items:center; gap:10px; padding:6px 0; font-size:0.78rem; }
  .sched-time { color:var(--text-dim); min-width:44px; font-size:0.7rem; font-weight:600; font-variant-numeric:tabular-nums; }
  .sched-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }

  /* Suggestions */
  .suggestion { padding:14px; border-radius:12px; margin-bottom:10px; font-size:0.78rem; line-height:1.55; }
  .suggestion:last-child { margin-bottom:0; }
  .s-label { font-size:0.6rem; font-weight:700; text-transform:uppercase; letter-spacing:0.06em; margin-bottom:4px; }

  /* Habit streaks */
  .habit { display:flex; align-items:center; gap:10px; padding:8px 0; }
  .habit-name { font-size:0.78rem; font-weight:600; min-width:64px; }
  .habit-dots { display:flex; gap:4px; }
  .habit-dot { width:22px; height:22px; border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:0.5rem; font-weight:700; }
  .dot-done { background:var(--green-bg); color:var(--green); }
  .dot-miss { background:var(--bg); color:var(--text-dim); }
  .habit-score { margin-left:auto; font-size:0.75rem; font-weight:700; }

  /* Insights */
  .insight-card { padding:12px 14px; border-radius:10px; background:var(--bg); margin-bottom:8px; font-size:0.75rem; line-height:1.55; color:var(--text-secondary); }
  .insight-card:last-child { margin-bottom:0; }
  .insight-card strong { color:var(--text); font-weight:600; }

  /* Weather */
  .weather-strip { display:flex; gap:8px; overflow-x:auto; padding-bottom:4px; }
  .w-day { min-width:76px; padding:10px 8px; border-radius:12px; text-align:center; background:var(--bg); flex-shrink:0; }
  .w-day.today { background:var(--blue-bg); border:1.5px solid rgba(59,130,246,0.2); }
  .w-day .w-label { font-size:0.6rem; font-weight:600; color:var(--text-dim); }
  .w-day .w-icon { margin:4px 0; display:flex; align-items:center; justify-content:center; }
  .w-day .w-icon svg { width:22px; height:22px; stroke-width:1.8; color:var(--text-secondary); }
  .w-day .w-temps { font-size:0.7rem; }
  .w-day .w-hi { font-weight:700; }
  .w-day .w-lo { color:var(--text-dim); }
  .w-day .w-rain { font-size:0.55rem; color:var(--blue); margin-top:2px; font-weight:600; }

  /* Hours blocks */
  .hours-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px; }
  .hours-block { background:var(--bg); border-radius:12px; padding:14px; text-align:center; }
  .hours-block .hv { font-size:1.6rem; font-weight:800; line-height:1; }
  .hours-block .hl { font-size:0.55rem; color:var(--text-dim); font-weight:600; text-transform:uppercase; margin-top:2px; }

  /* Activity table */
  .act-table { width:100%; font-size:0.75rem; border-collapse:collapse; }
  .act-table th { text-align:left; padding:6px 8px; font-size:0.6rem; font-weight:600; text-transform:uppercase; color:var(--text-dim); letter-spacing:0.04em; }
  .act-table td { padding:8px; border-top:1px solid var(--border); }
  .act-type { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:6px; }

  /* Nutrition */
  .meal-item { display:flex; justify-content:space-between; padding:7px 0; border-bottom:1px solid var(--border); font-size:0.78rem; }
  .meal-item:last-child { border-bottom:none; }
  .meal-time { color:var(--text-dim); font-size:0.7rem; font-weight:500; }

  /* Food panel */
  .food-section { margin-bottom:14px; }
  .food-section:last-child { margin-bottom:0; }
  .food-section-title { font-size:0.65rem; font-weight:700; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.05em; margin-bottom:8px; }
  .meal-suggestion { background:var(--bg); border-radius:10px; padding:12px; margin-bottom:8px; }
  .meal-suggestion:last-child { margin-bottom:0; }
  .ms-name { font-size:0.82rem; font-weight:700; margin-bottom:3px; }
  .ms-reason { font-size:0.7rem; color:var(--text-secondary); line-height:1.4; }
  .ms-tags { display:flex; gap:5px; margin-top:6px; flex-wrap:wrap; }
  .ms-tag { font-size:0.55rem; font-weight:600; padding:2px 8px; border-radius:5px; text-transform:uppercase; letter-spacing:0.03em; }
  .pantry-list { display:flex; flex-wrap:wrap; gap:5px; }
  .pantry-chip { font-size:0.68rem; background:var(--bg); padding:4px 10px; border-radius:7px; color:var(--text-secondary); font-weight:500; }
  .nutrition-targets { display:grid; grid-template-columns:repeat(2,1fr); gap:6px; margin-top:8px; }
  .nt-item { background:var(--bg); border-radius:8px; padding:8px 10px; display:flex; justify-content:space-between; align-items:center; font-size:0.72rem; }
  .nt-label { color:var(--text-secondary); font-weight:500; }
  .nt-val { font-weight:700; }

  /* Training plan */
  .tp-day { margin-bottom:14px; padding-bottom:14px; border-bottom:1px solid var(--border); }
  .tp-day:last-child { margin-bottom:0; padding-bottom:0; border-bottom:none; }
  .tp-day-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
  .tp-day-label { font-size:0.7rem; font-weight:700; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.04em; }
  .tp-type { font-size:0.6rem; font-weight:700; padding:3px 8px; border-radius:5px; text-transform:uppercase; letter-spacing:0.03em; }
  .tp-session { font-size:0.85rem; font-weight:700; margin-bottom:3px; }
  .tp-details { font-size:0.75rem; color:var(--text-secondary); line-height:1.5; }
  .tp-rationale { font-size:0.7rem; color:var(--text-dim); margin-top:5px; font-style:italic; }
  .tp-stats { display:flex; gap:6px; margin-top:8px; }
  .tp-stat { font-size:0.6rem; font-weight:600; padding:3px 8px; border-radius:5px; background:var(--bg); color:var(--text-secondary); }

  /* Location pill */
  .location-pill { display:inline-flex; align-items:center; gap:4px; font-size:0.65rem; background:var(--bg); padding:3px 10px; border-radius:6px; color:var(--text-secondary); font-weight:500; margin-left:8px; }
</style>
</head>

function renderCharts() {
  const H = DATA.healthTrends;
  const labels = H.map(d=>d.date);
  const gridColor = 'rgba(0,0,0,0.04)';
  const tickFont = { family:'Inter,system-ui,sans-serif', size:10, weight:'500' };
  const tickColor = '#9ca3af';

  Chart.defaults.elements.point.radius = 4;
  Chart.defaults.elements.point.hoverRadius = 6;
  Chart.defaults.elements.line.borderWidth = 2.5;

  // SLEEP: combo chart — bars for hours, line for score
  new Chart(document.getElementById('sleepChart'), {
    type:'bar',
    data:{
      labels,
      datasets:[
        { type:'bar', label:'Deep', data:H.map(d=>d.deep), backgroundColor:'#6366f1', borderRadius:3, order:2 },
        { type:'bar', label:'Light', data:H.map(d=>d.light), backgroundColor:'#93c5fd', borderRadius:3, order:2 },
        { type:'bar', label:'REM', data:H.map(d=>d.rem), backgroundColor:'#06b6d4', borderRadius:3, order:2 },
        { type:'line', label:'Score', data:H.map(d=>d.sleepScore), borderColor:'#1e40af', backgroundColor:'transparent', yAxisID:'y1', tension:0.35, pointBackgroundColor:'#1e40af', pointBorderColor:'#fff', pointBorderWidth:2, order:1 }
      ]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ labels:{color:tickColor,font:tickFont,boxWidth:10,padding:10},position:'top' } },
      scales:{
        x:{ stacked:true, grid:{display:false}, ticks:{color:tickColor,font:tickFont} },
        y:{ stacked:true, grid:{color:gridColor}, ticks:{color:tickColor,font:tickFont,callback:v=>v+'h'}, title:{display:false} },
        y1:{ position:'right', min:40, max:100, grid:{display:false}, ticks:{color:'#1e40af',font:tickFont} }
      }
    }
  });

  // BODY BATTERY: floating bars (high-low range)
  new Chart(document.getElementById('bbChart'), {
    type:'bar',
    data:{
      labels,
      datasets:[{
        label:'Range',
        data:H.map(d=>[d.bbLow, d.bbHigh]),
        backgroundColor:H.map(d=>{
          const avg = (d.bbHigh+d.bbLow)/2;
          return avg>60?'rgba(34,197,94,0.6)':avg>40?'rgba(234,179,8,0.6)':'rgba(239,68,68,0.6)';
        }),
        borderRadius:6, borderSkipped:false, barPercentage:0.55
      }]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false}, tooltip:{ callbacks:{ label:ctx=>`High: ${ctx.raw[1]}  Low: ${ctx.raw[0]}` } } },
      scales:{
        x:{ grid:{display:false}, ticks:{color:tickColor,font:tickFont} },
        y:{ min:0, max:100, grid:{color:gridColor}, ticks:{color:tickColor,font:tickFont} }
      }
    }
  });

  // HRV + STRESS + RHR
  new Chart(document.getElementById('hrvChart'), {
    type:'line',
    data:{
      labels,
      datasets:[
        { label:'HRV (ms)', data:H.map(d=>d.hrv), borderColor:'#14b8a6', backgroundColor:'rgba(20,184,166,0.08)', fill:true, tension:0.4, pointBackgroundColor:'#14b8a6', pointBorderColor:'#fff', pointBorderWidth:2 },
        { label:'Stress', data:H.map(d=>d.stress), borderColor:'#f97316', backgroundColor:'rgba(249,115,22,0.08)', fill:true, tension:0.4, pointBackgroundColor:'#f97316', pointBorderColor:'#fff', pointBorderWidth:2, yAxisID:'y1' },
        { label:'RHR', data:H.map(d=>d.rhr), borderColor:'#ef4444', tension:0.4, borderDash:[5,5], pointBackgroundColor:'#ef4444', pointBorderColor:'#fff', pointBorderWidth:2, yAxisID:'y1' }
      ]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ labels:{color:tickColor,font:tickFont,boxWidth:10,padding:10},position:'top' } },
      scales:{
        x:{ grid:{display:false}, ticks:{color:tickColor,font:tickFont} },
        y:{ position:'left', min:80, max:130, grid:{color:gridColor}, ticks:{color:'#14b8a6',font:tickFont} },
        y1:{ position:'right', min:10, max:50, grid:{display:false}, ticks:{color:'#f97316',font:tickFont} }
      }
    }
  });

  // STEPS: bar chart
  const stepGoals = [9290,8590,8760,10060,12060,12370,13440];
  new Chart(document.getElementById('stepsChart'), {
    type:'bar',
    data:{
      labels,
      datasets:[
        { label:'Steps', data:H.map(d=>d.steps), backgroundColor:H.map((d,i)=>d.steps>=stepGoals[i]?'rgba(34,197,94,0.7)':'rgba(249,115,22,0.5)'), borderRadius:6, barPercentage:0.6 },
        { type:'line', label:'Goal', data:stepGoals, borderColor:'#9ca3af', borderDash:[4,4], borderWidth:1.5, pointRadius:0, fill:false }
      ]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ labels:{color:tickColor,font:tickFont,boxWidth:10,padding:10},position:'top' } },
      scales:{
        x:{ grid:{display:false}, ticks:{color:tickColor,font:tickFont} },
        y:{ grid:{color:gridColor}, ticks:{color:tickColor,font:tickFont,callback:v=>(v/1000)+'k'} }
      }
    }
  });
}

render();
lucide.createIcons();
</script>
</body>
</html>
