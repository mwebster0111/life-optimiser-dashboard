name: Life Optimiser — Data Refresh

on:
  schedule:
    # 11:00 PM Copenhagen time (UTC+2 CEST / UTC+1 CET)
    # Using 21:00 UTC for CEST (summer), adjust to 22:00 UTC for CET (winter)
    - cron: '0 21 * * *'
  workflow_dispatch: # Allow manual triggers

jobs:
  data-refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Set timezone
        run: sudo timedatectl set-timezone Europe/Copenhagen

      - name: Run data refresh
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          GARMIN_SESSION: ${{ secrets.GARMIN_SESSION }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GCAL_CLIENT_ID: ${{ secrets.GCAL_CLIENT_ID }}
          GCAL_CLIENT_SECRET: ${{ secrets.GCAL_CLIENT_SECRET }}
          GCAL_REFRESH_TOKEN: ${{ secrets.GCAL_REFRESH_TOKEN }}
          TZ: Europe/Copenhagen
        run: python scripts/data_refresh.py
